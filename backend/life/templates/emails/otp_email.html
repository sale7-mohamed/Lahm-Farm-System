{% extends 'emails/base_email.html' %}
{% block content %}
    <h3 style="margin-top: 0; text-align: right; direction: rtl;">مرحباً {{ name }}،</h3>
    <p style="text-align: right; direction: rtl;">طلبك لرمز التحقق (OTP) قيد التنفيذ. يرجى استخدام الكود التالي لإتمام العملية:</p>
    <div style="text-align: center; margin: 30px 0; direction: ltr;">
        <!-- جعلنا اتجاه الأرقام ltr بشكل صريح -->
        <span style="font-size: 32px; font-weight: bold; letter-spacing: 10px; padding: 15px 30px; background: #e8f5e9; color: #198754; border-radius: 12px; border: 2px dashed #198754; display: inline-block; direction: ltr; unicode-bidi: bidi-override;">
            {{ code }}
        </span>
    </div>
    <p style="text-align: right; direction: rtl;">هذا الكود صالح لمدة 5 دقائق. إذا لم تطلب هذا الكود، يرجى تجاهل هذه الرسالة.</p>
{% endblock %}
